<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add New User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <div class="mb-3">
        <a href="/admin" class="text-decoration-none">Admin panel</a> /
        <span>New User</span>
    </div>

    <h2 class="mb-4">Add new user</h2>

    <div class="card">
        <div class="card-body">
            <form action="/admin/add" method="post" th:object="${user}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="mb-3">
                    <label class="form-label">First name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Last name</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" th:field="*{age}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <div>
                        <div th:each="role : ${allRoles}" class="form-check">
                            <input type="checkbox"
                                   th:value="${role.id}"
                                   name="roleIds"
                                   class="form-check-input"
                                   th:id="'role_' + ${role.id}">
                            <label th:for="'role_' + ${role.id}" class="form-check-label">
                                <span th:text="${role.name.replace('ROLE_', '')}"></span>
                            </label>
                        </div>
                    </div>
                    <small class="text-muted">Select one or more roles</small>
                </div>

                <button type="submit" class="btn btn-primary">Add new user</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
