<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <div class="mb-3">
        <a href="/admin" class="text-decoration-none">Admin panel</a>
    </div>

    <div class="alert alert-info">
        <strong th:text="${#authentication.name}"></strong> with roles:
        <span th:text="${#authentication.authorities}"></span>
    </div>

    <h2 class="mb-4">Edit user</h2>

    <div class="card">
        <div class="card-body">
            <form action="/admin/edit" method="post" th:object="${user}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="id" th:value="${user.id}" />

                <div class="mb-3">
                    <label class="form-label">ID</label>
                    <input type="text" th:value="${user.id}" class="form-control" readonly disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label">First name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Last name</label>
                    <input type="text" th:field="*{lastName}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" th:field="*{age}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="Leave blank to keep current password">
                    <small class="text-muted">Leave empty to keep current password</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <div>
                        <div th:each="role : ${allRoles}" class="form-check">
                            <input type="checkbox"
                                   th:value="${role.id}"
                                   name="roleIds"
                                   class="form-check-input"
                                   th:id="'role_' + ${role.id}"
                                   th:checked="${user.roles.contains(role)}">
                            <label th:for="'role_' + ${role.id}" th:text="${role.name.replace('ROLE_', '')}" class="form-check-label"></label>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Edit</button>
                    <a href="/admin" class="btn btn-secondary">Close</a>
                </div>
            </form>
        </div>
    </div>

    <div class="mt-3 text-end">
        <form action="/logout" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>

</div>
</body>
</html>
