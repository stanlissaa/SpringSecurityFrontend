<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

    <div class="mb-3">
        <a href="/admin" class="text-decoration-none">Admin panel</a>
    </div>

    <div class="alert alert-info">
        <strong th:text="${#authentication.name}"></strong> with roles:
        <span th:each="role, iterStat : ${#authentication.authorities}">
            <span th:text="${role.getAuthority().replace('ROLE_', '')}"></span>
            <span th:if="${!iterStat.last}">, </span>
        </span>
    </div>

    <h2 class="mb-4 text-danger">Delete user</h2>

    <div class="card border-danger">
        <div class="card-header bg-danger text-white">
            <h5 class="mb-0">Confirm deletion</h5>
        </div>
        <div class="card-body">
            <p>Are you sure you want to delete the following user?</p>

            <table class="table table-bordered">
                <tr>
                    <th style="width: 150px;">ID</th>
                    <td th:text="${user.id}">1</td>
                </tr>
                <tr>
                    <th>First name</th>
                    <td th:text="${user.name}">Name</td>
                </tr>
                <tr>
                    <th>Last name</th>
                    <td th:text="${user.lastName}">LastName</td>
                </tr>
                <tr>
                    <th>Age</th>
                    <td th:text="${user.age}">25</td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td th:text="${user.email}">email@mail.ru</td>
                </tr>
                <tr>
                    <th>Role</th>
                    <td>
                        <span th:each="role, iterStat : ${user.roles}">
                            <span th:text="${role.name.replace('ROLE_', '')}" class="badge bg-secondary me-1"></span>
                        </span>
                    </td>
                </tr>
            </table>

            <div class="mt-4 d-flex gap-2">
                <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
                <a href="/admin" class="btn btn-secondary">Close</a>
            </div>
        </div>
    </div>

    <div class="mt-3 text-end">
        <form action="/logout" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>

</div>
</body>
</html>
